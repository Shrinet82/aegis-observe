apiVersion: v1
kind: Secret
metadata:
  name: azure-ai-secret
  namespace: oppe2-app
type: Opaque
stringData:
  api-key: "YOUR_AZURE_OPENAI_API_KEY_HERE"
---
apiVersion: v1
kind: Secret
metadata:
  name: git-credentials
  namespace: oppe2-app
type: Opaque
stringData:
  github-token: "YOUR_GITHUB_PAT_HERE"
---
apiVersion: v1
kind: Secret
metadata:
  name: signoz-auth-secret
  namespace: oppe2-app
type: Opaque
stringData:
  token: "YOUR_SIGNOZ_API_TOKEN_HERE"
