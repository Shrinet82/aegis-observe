apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-detection-api
  namespace: oppe2-app
  labels:
    app: fraud-detection-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fraud-detection-api
  template:
    metadata:
      labels:
        app: fraud-detection-api
    spec:
      serviceAccountName: telemetry-access
      containers:
      - name: fraud-api-container
        image: fraud-app:local
        imagePullPolicy: Never
        command:
        - /bin/sh
        - -c
        args:
        - pip install opentelemetry-instrumentation-fastapi==0.46b0 && uvicorn app:app --host 0.0.0.0 --port 8001
        ports:
        - containerPort: 8001
        env:
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: http://signoz-ingester.signoz.svc.cluster.local:4317
        resources:
          requests:
            cpu: 500m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 256Mi
        volumeMounts:
        - name: app-py-volume
          mountPath: /app/app.py
          subPath: app.py
      volumes:
      - name: app-py-volume
        configMap:
          name: fraud-app-py
