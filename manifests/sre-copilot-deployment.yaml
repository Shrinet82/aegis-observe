apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-copilot
  namespace: oppe2-app
  labels:
    app: sre-copilot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sre-copilot
  template:
    metadata:
      labels:
        app: sre-copilot
    spec:
      serviceAccountName: telemetry-access
      containers:
      - name: copilot
        image: python:3.11-slim
        command:
        - /bin/bash
        - -c
        - |
          apt-get update && apt-get install -y curl git
          curl -LO https://dl.k8s.io/release/v1.30.0/bin/linux/amd64/kubectl
          chmod +x kubectl && mv kubectl /usr/local/bin/
          pip install -r /app/requirements.txt
          python /app/agent.py
        env:
        - name: AZURE_OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: azure-ai-secret
              key: api-key
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: git-credentials
              key: github-token
        - name: GITHUB_REPO_URL
          value: github.com/Shrinet82/flagship-gitops.git
        - name: AZURE_OPENAI_ENDPOINT
          value: https://shashwatpratap94550-3810-resourc.services.ai.azure.com/
        - name: SIGNOZ_API_URL
          value: http://signoz.signoz.svc.cluster.local:8080/api/v1/query_range
        - name: SIGNOZ_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: signoz-auth-secret
              key: token
        volumeMounts:
        - name: code
          mountPath: /app
      volumes:
      - name: code
        configMap:
          name: sre-copilot-code
